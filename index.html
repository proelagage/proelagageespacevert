<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Élagage Espace Vert</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

/* HEADER */
.header {
  height: 90vh;
  background: url("https://images.pexels.com/photos/5699663/pexels-photo-5699663.jpeg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  background: rgba(0,0,0,0.6);
  padding: 25px;
  border-radius: 15px;
  color: white;
  max-width: 300px;
}

.overlay h1 {
  margin: 0;
  font-size: 26px;
}

.overlay p {
  margin: 10px 0;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 14px 25px;
  background: linear-gradient(45deg, #ff8800, #ff6600);
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
}

/* SERVICES */
.section {
  padding: 40px 20px;
  text-align: center;
}

.services {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.card {
  background: #eaeaea;
  padding: 20px;
  border-radius: 15px;
  font-weight: bold;
}

/* AVANT APRES */
.gallery {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.before-after {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}

.before-after img {
  width: 100%;
  border-radius: 10px;
}

/* CONTACT */
.contact {
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
              url("https://images.pexels.com/photos/5699666/pexels-photo-5699666.jpeg") center/cover;
  color: white;
  text-align: center;
  padding: 40px 20px;
}

.btn2 {
  display: inline-block;
  margin-top: 15px;
  padding: 15px 25px;
  background: linear-gradient(45deg, #ff8800, #ff6600);
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="overlay">
    <h1>PRO ELAGAGE ESPACE VERT</h1>
    <p>Devis Gratuit - Intervention Rapide</p>
    <a href="tel:0612395586" class="btn">📞 Appeler</a>
  </div>
</div>

<!-- SERVICES -->
<div class="section">
  <h2>Nos services</h2>
  <div class="services">
    <div class="card">Élagage & abattage</div>
    <div class="card">Taille de haies</div>
    <div class="card">Entretien de jardin</div>
    <div class="card">Débroussaillage</div>
    <div class="card">Nettoyage terrain</div>
  </div>
</div>

<!-- AVANT / APRES -->
<div class="section">
  <h2>Avant / Après</h2>

  <div class="gallery">

    <div class="before-after">
      <img src="https://images.pexels.com/photos/5699664/pexels-photo-5699664.jpeg">
      <img src="https://images.pexels.com/photos/5699665/pexels-photo-5699665.jpeg">
    </div>

    <div class="before-after">
      <img src="https://images.pexels.com/photos/5699666/pexels-photo-5699666.jpeg">
      <img src="https://images.pexels.com/photos/5699667/pexels-photo-5699667.jpeg">
    </div>

  </div>
</div>

<!-- CONTACT -->
<div class="contact">
  <h2>Contact</h2>
  <p>📞 06 12 39 55 86</p>
  <a href="tel:0612395586" class="btn2">📞 Appeler maintenant</a>
</div>

</body>
</html>
