<!DOCTYPE html>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

/* HEADER */
.header {
  height: 85vh;
  background: url("https://images.unsplash.com/photo-1627308595229-7830a5c91f9f") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  background: rgba(0,0,0,0.6);
  padding: 20px;

  text-align: center;
  color: white;
}

.overlay h1 {
  margin: 0;

}

.overlay p {

}

.btn {

/* SERVICES */

  padding: 40px 20px;
  text-align: center;
}

  gap: 15px;
}

.card {
  background: #eaeaea;
  padding: 20px;
  border-radius: 15px;
  font-weight: bold;
}

/* AVANT APRES */
.gallery {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
}

/* CONTACT */
.contact {
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6") center/cover;
  color: white;
  text-align: center;
  padding: 40px 20px;
}

.btn2 {
  display: inline-block;
  margin-top: 15px;
  padding: 15px 25px;
  background: #ff8800;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: bold;
}

<body>

<!-- HEADER -->
<div class="header">
