<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

/* HEADER */
.header {
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
  url("https://images.unsplash.com/photo-1597262975002-c5c3b14bbd62") center/cover;

}

.header h1 {
  font-size: 28px;
  margin: 0;
}

.header p {

}

/* BOUTONS */
.btn {
  background: #ff9800;
  color: white;
  padding: 15px 25px;
  border-radius: 30px;
  text-decoration: none;
  display: inline-block;
  margin-top: 10px;

}

/* SECTIONS */
section {
  padding: 20px;
  text-align: center;
}

/* SERVICES */
.services {
  display: grid;

  gap: 10px;
}

.card {
  background: #eee;
  padding: 15px;
  border-radius: 12px;
  font-weight: bold;
  transition: 0.3s;
}

.card:hover {
  background: #ddd;
}

/* AVANT APRES */
.before-after {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.before-after img {
  width: 100%;
  border-radius: 10px;
}

/* CONTACT */
.contact {
  background: #2e7d32;
  color: white;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  font-size: 22px;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
</style>
</head>
